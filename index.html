<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貓咪大戰 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-size: 4px;
            --bg-color: #000;
            --text-color: #fff;
            --ui-color: #f1c40f;
            --hp-color: #2ecc71;
            --damage-color: #e74c3c;
        }

        body { 
            font-family: 'VT323', monospace; 
            background-color: #1a1a1a; 
            color: var(--text-color); 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        /* 掃描線效果 */
        .crt-effect { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); 
            background-size: 100% 4px, 3px 100%; 
            pointer-events: none; z-index: 10; 
        }

        .battle-arena { 
            width: 100%; 
            max-width: 640px; 
            min-height: 80vh;
            background-color: var(--bg-color); 
            border: calc(var(--pixel-size) * 1.5) solid var(--text-color); 
            box-sizing: border-box; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 15px; 
        }

        /* === 敵方區域 (佈局大調整) === */
        .enemy-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 2rem; 
            line-height: 1.1; 
            min-height: 220px; /* 增加高度包容發言框 */
            position: relative;
        }
        
        /* ★ 敵人圖案與發言框容器 */
        .enemy-visual-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 30px; /* 為發言框留空位 */
        }

        /* 純貓咪 ASCII，已移除原本的文字 */
        .wizard-cat { 
            white-space: pre; 
            letter-spacing: -2px; 
            color: #bdc3c7; 
            transition: 0.1s; 
            position: relative;
            margin: 0 auto; /* 居中對齊 */
            font-size: 2.2rem;
        }
        
        /* ★ 新增：角色右上方復古對話框 ★ */
        .cat-speech-bubble {
            position: absolute;
            top: 0px; /* 定位於視覺容器上方 */
            right: -130px; /* 向右偏移 */
            background-color: var(--bg-color);
            border: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            border-radius: calc(var(--pixel-size) * 2);
            padding: 10px 15px;
            font-size: 1.5rem;
            color: var(--text-color);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* 對話框的尖角 (復古風) */
        .cat-speech-bubble::after {
            content: "";
            position: absolute;
            left: calc(var(--pixel-size) * -2);
            top: calc(var(--pixel-size) * 2);
            width: calc(var(--pixel-size) * 3);
            height: calc(var(--pixel-size) * 3);
            background-color: var(--bg-color);
            border-left: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            border-bottom: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            transform: rotate(45deg);
        }

        /* 左右抖動傷害動畫 */
        @keyframes damageShake {
            0% { transform: translateX(0px); }
            10% { transform: translateX(20px); }
            20% { transform: translateX(-20px); }
            30% { transform: translateX(15px); }
            40% { transform: translateX(-15px); }
            50% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            70% { transform: translateX(5px); }
            80% { transform: translateX(-5px); }
            90% { transform: translateX(2px); }
            100% { transform: translateX(0px); }
        }
        .wizard-cat.shake {
            animation: damageShake 0.6s linear;
            animation-iteration-count: 1;
        }

        .enemy-hp-container { display: flex; align-items: center; margin-top: 15px; gap: 15px; font-size: 1.5rem; }
        .enemy-hp-bar-outer { width: 150px; height: 15px; background-color: var(--damage-color); border: 2px solid #fff;}
        .enemy-hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); transition: width 0.4s ease-out; }

        /* === 戰鬥對話框 === */
        .battle-box { 
            width: 100%; 
            min-height: 150px; 
            border: calc(var(--pixel-size)) solid var(--text-color); 
            box-sizing: border-box; 
            background-color: var(--bg-color); 
            padding: 20px; 
            font-size: 1.8rem; 
            text-align: left; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .box-text { width: 100%; line-height: 1.4; }

        /* ACT 選單選項 */
        .act-menu-container { display: none; width: 100%; flex-wrap: wrap; justify-content: space-between; gap: 10px;}
        .act-option { width: 45%; cursor: pointer; transition: 0.1s; }
        .act-option:hover { color: var(--ui-color); }
        .act-option::before { content: "♥ "; color: var(--text-color); opacity: 0; transition: 0.1s; }
        .act-option:hover::before { opacity: 1; color: var(--damage-color); }

        /* 攻擊指針區 */
        #attack-bar-container { display: none; width: 90%; height: 40px; position: relative; margin: 20px 0; }
        .attack-bar { width: 100%; height: 100%; background-color: var(--damage-color); border: calc(var(--pixel-size)) solid var(--text-color); box-sizing: border-box; position: relative; }
        .green-zone { width: 15%; height: 100%; background-color: var(--hp-color); position: absolute; left: 50%; transform: translateX(-50%); }
        .pointer { width: calc(var(--pixel-size) * 1.5); height: calc(100% + calc(var(--pixel-size) * 2)); background-color: var(--text-color); position: absolute; left: 0%; top: calc(var(--pixel-size) * -1); transition: left 0.1s linear; }
        .pointer.stopped { box-shadow: 0 0 calc(var(--pixel-size) * 2) var(--text-color); background-color: var(--text-color); }

        /* === 玩家 UI 區域 === */
        .player-ui { margin-top: 10px; display: flex; flex-direction: column; align-items: flex-start; font-size: 1.5rem; }
        .player-info-row { display: flex; align-items: center; width: 100%; gap: 15px; flex-wrap: wrap; }
        .hp-bar-outer { width: 120px; height: 20px; background-color: var(--damage-color); border: 2px solid #fff;}
        .hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); }

        /* === 動作按鈕 === */
        .action-buttons { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        .action-btn { 
            flex: 1 1 25%;
            background-color: var(--bg-color); 
            color: var(--text-color); 
            border: calc(var(--pixel-size)) solid var(--text-color); 
            padding: 12px 5px; 
            font-family: 'VT323', monospace; 
            font-size: 1.8rem; 
            cursor: pointer; 
            position: relative; 
            text-align: center;
            transition: color 0.1s, border-color 0.1s;
        }

        /* 愛心指向邏輯核心 */
        .action-btn::before { content: "♥"; color: var(--damage-color); opacity: 0; position: absolute; left: 5px; transition: opacity 0.1s; }
        .action-btn:hover { color: var(--ui-color); border-color: var(--ui-color); }
        .action-btn:hover::before { opacity: 1 !important; } 
        .action-btn.active::before { opacity: 1; }
        .action-buttons:hover .action-btn.active::before { opacity: 0; }
        
        .action-btn:disabled { color: #555; border-color: #555; cursor: not-allowed; }

        .status-container { position: absolute; top: -25px; right: 0px; font-size: 1rem; color: #888; white-space: nowrap;}
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; background-color: #e74c3c; }
        .online-dot.active { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }

        /* 📱 手機版排版修正 */
        @media (max-width: 600px) {
            .battle-arena { padding: 15px; border-width: 2px; }
            .enemy-area { font-size: 1.5rem; min-height: 180px; }
            
            /* 手機版將對話框移到貓咪上方正中間 */
            .enemy-visual-container { flex-direction: column-reverse; padding-top: 0; }
            .wizard-cat { font-size: 1.5rem; letter-spacing: -1px; margin-top: 10px;}
            .cat-speech-bubble {
                position: static; /* 釋放定位 */
                transform: none; right: auto; top: auto;
                margin-bottom: 15px; /* 貓咪上方空間 */
                font-size: 1.2rem;
                padding: 8px 12px;
            }
            .cat-speech-bubble::after { display: none; /* 移除手機版的尖角 */ }

            .battle-box { font-size: 1.4rem; min-height: 120px; padding: 15px; }
            .player-ui { font-size: 1.2rem; }
            .action-btn { 
                flex: 1 1 100%;
                font-size: 1.5rem; 
                padding: 12px 0; 
                text-align: center;
                margin-bottom: 5px;
            }
            .action-btn::before { display: none !important; }
            .action-btn.active { color: var(--ui-color); border-color: var(--ui-color); }
            
            .status-container { font-size: 0.8rem; top: -20px; }
        }
    </style>
</head>
<body>

<div class="crt-effect"></div>

<div class="container" style="width: 100%; max-width: 640px; position: relative;">
    <div class="status-container">
        <span id="online-dot" class="online-dot"></span> ESP32: <span id="status-text">離線</span>
    </div>

    <div class="battle-arena">
        
        <div class="enemy-area">
            <div id="msg" style="display: none; color: var(--damage-color); font-size: 1.5rem; margin-bottom: 10px;">注意 ESP32 指針！按下攻擊</div>
            
            <div class="enemy-visual-container">
                <div id="cat-canvas" class="wizard-cat">
 /\_/\ 
( o.o )
 > ^ < 
                </div>
                
                <div id="cat-speech-text" class="cat-speech-bubble">
                    Meeeowgic!
                </div>
            </div>

            <div class="enemy-hp-container">
                <span style="color:var(--hp-color);">HP</span>
                <div class="enemy-hp-bar-outer"><div id="enemy-hp-bar" class="enemy-hp-bar-inner"></div></div>
            </div>
        </div>

        <div class="battle-box">
            <div id="box-text-content" class="box-text">一隻戴著魔法帽的野貓擋住了去路喵！<br>在網頁點擊 FIGHT 後按 ESP32 按鈕攻擊。</div>
            
            <div id="act-menu-container" class="act-menu-container">
                <div class="act-option" onclick="executeAct('check')">* 檢查 (Check)</div>
                <div class="act-option" onclick="executeAct('praise')">* 讚賞 (Praise)</div>
            </div>

            <div id="attack-bar-container">
                <div class="attack-bar">
                    <div class="green-zone"></div>
                    <div id="attack-pointer" class="pointer"></div>
                </div>
            </div>
        </div>

        <div class="player-ui">
            <div class="player-info-row">
                <span>YOU [LV 1]</span>
                <div class="hp-bar-outer"><div class="hp-bar-inner"></div></div>
                <span>HP 20/20</span>
            </div>
        </div>

        <div class="action-buttons">
            <button id="btn-fight" class="action-btn active" onclick="startAttackSequence()">FIGHT</button>
            <button id="btn-act" class="action-btn" onclick="openActMenu()">ACT</button>
            <button id="btn-mercy" class="action-btn" onclick="executeFlee()">MERCY</button>
        </div>

    </div>
</div>

<script>
    // === 設定與 MQTT ===
    const ROOM_ID = "UNDER_CAT_BATTLE_999"; 
    const topicBtn = `morsegame/${ROOM_ID}/button`;
    const topicStatus = `morsegame/${ROOM_ID}/status`;
    
    let client = new Paho.MQTT.Client("broker.emqx.io", 8084, "Web_" + Math.random().toString(16).substr(2,5));
    client.onMessageArrived = (m) => handleMqttMessage(m.destinationName, m.payloadString);
    client.connect({ useSSL: true, onSuccess: () => {
        client.subscribe(topicBtn); client.subscribe(topicStatus); setOffline();
    }});

    const battleState = { IDLE: 0, ATTACK_SWING: 1, MENU_ACTION: 2, ENEMY_DAMAGE_ANIM: 3 };
    let gameState = battleState.IDLE;
    let enemyMaxHp = 100, enemyHp = 100, lastPingTime = 0;

    // ★ 移除原本發言文字的純 ASCII，重心完美居中
    const CAT_ART = {
        normal: " /\\_/\\ \n( o.o )\n > ^ < ",
        hurt:   " /\\_/\\ \n( >.< )\n > - < ",
        happy:  " /\\_/\\ \n( ^.^ )\n > w < ",
        shock:  " /\\_/\\ \n( O_O )\n > - < ",
        bye:    " /\\_/\\ \n( -.- )\n > ~ < "
    };

    // ★ 新增：發言文字，根據貓咪表情同步更新
    const CAT_SPEECH = {
        normal: "Meeeowgic!",
        hurt:   "Ouch!",
        happy:  "Purrr~♥",
        shock:  "...",
        bye:    "Bye bye~"
    };

    setInterval(() => {
        if (Date.now() - lastPingTime > 5000 && lastPingTime !== 0) setOffline();
    }, 1000);

    function setOnline() { document.getElementById("online-dot").classList.add("active"); document.getElementById("status-text").innerText = "就緒"; }
    function setOffline() { document.getElementById("online-dot").classList.remove("active"); document.getElementById("status-text").innerText = "離線中"; lastPingTime = 0; }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, dur, type='square', volume=0.05) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(volume, audioCtx.currentTime); o.start(); setTimeout(() => o.stop(), dur);
    }

    function handleMqttMessage(topic, payload) {
        if (topic === topicStatus) {
            if (payload === "ONLINE" || payload === "PING") { lastPingTime = Date.now(); setOnline(); }
            else if (payload === "OFFLINE") setOffline();
        } else if (topic === topicBtn && payload === "DOWN") {
            triggerPhysicalAttack();
        }
    }

    function showDialog(text) {
        document.getElementById("box-text-content").style.display = "block";
        document.getElementById("act-menu-container").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("msg").style.display = "none";
        document.getElementById("box-text-content").innerHTML = text;
    }
    
    // ★ 修改：同時更新貓咪表情 ASCII 與其發言框文字
    function updateCat(artType) { 
        document.getElementById("cat-canvas").innerText = CAT_ART[artType];
        document.getElementById("cat-speech-text").innerText = CAT_SPEECH[artType];
    }

    // === 1. FIGHT 系統 ===
    let attackPointerX = 0, attackPointerDir = 1, attackAnimationId = null;

    function startAttackSequence() {
        if(gameState !== battleState.IDLE) return;
        gameState = battleState.ATTACK_SWING;
        document.getElementById("btn-fight").classList.remove("active");
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("msg").style.display = "block";
        document.getElementById("attack-bar-container").style.display = "block";
        
        playSound(440, 100, 'square'); setTimeout(()=>playSound(880, 100, 'square'), 100);
        attackPointerX = 0; attackPointerDir = 1;
        document.getElementById("attack-pointer").style.left = "0%";
        document.getElementById("attack-pointer").classList.remove("stopped");
        startPointerAnimation();
    }

    function startPointerAnimation() {
        if(gameState !== battleState.ATTACK_SWING) return;
        
        // ★ 核心優化：將速度步長從原本的 4 減慢到 2 ★
        attackPointerX += 2 * attackPointerDir; 
        
        if (attackPointerX >= 100 || attackPointerX <= 0) attackPointerDir *= -1;
        document.getElementById("attack-pointer").style.left = attackPointerX + "%";
        attackAnimationId = requestAnimationFrame(startPointerAnimation);
    }

    function triggerPhysicalAttack() {
        if (gameState !== battleState.ATTACK_SWING) return;
        cancelAnimationFrame(attackAnimationId);
        document.getElementById("attack-pointer").classList.add("stopped");
        playSound(1200, 50, 'square', 0.1);

        const greenMin = 42.5, greenMax = 57.5; 
        const isHit = attackPointerX >= greenMin && attackPointerX <= greenMax;
        const dmg = isHit ? Math.round(40 - Math.abs(50 - attackPointerX)) : 0;
        const accuracy = Math.round(attackPointerX);

        gameState = battleState.ENEMY_DAMAGE_ANIM;
        document.getElementById("cat-canvas").classList.add("shake");
        if(isHit) playSound(150, 600, 'sawtooth', 0.1);

        // 抖動結束後 (0.6s)
        setTimeout(() => {
            document.getElementById("cat-canvas").classList.remove("shake");
            document.getElementById("attack-bar-container").style.display = "none";
            document.getElementById("box-text-content").style.display = "block";
            document.getElementById("msg").style.display = "none";
            if (isHit) {
                handleAttackResolutionHit(dmg, accuracy);
            } else {
                handleAttackResolutionMiss();
            }
        }, 600); 
    }

    function handleAttackResolutionHit(dmg, accuracy) {
        gameState = battleState.MENU_ACTION;
        enemyHp -= dmg; if(enemyHp < 0) enemyHp = 0;
        let hpPercent = (enemyHp / enemyMaxHp) * 100;
        document.getElementById("enemy-hp-bar").style.width = hpPercent + "%";
        
        // ★ 此時更換貓臉為 hurt，並更新對話為 Ouch!喵
        updateCat("hurt"); 
        
        showDialog(`* 成功扣除 ${dmg} 傷害。準確度: ${accuracy}<br>* 對野貓造成了有效打擊。`);
        
        setTimeout(() => {
            if (enemyHp === 0) {
                showDialog("* 魔法野貓擋被擊敗了喵！喵嗚嗚嗚。");
                updateCat(" shock"); // shock face
                setTimeout(resetGame, 4000); 
            } else {
                resetToIdle();
            }
        }, 2000);
    }

    function handleAttackResolutionMiss() {
        gameState = battleState.MENU_ACTION;
        playSound(100, 300, 'sawtooth', 0.1);
        updateCat("normal");
        showDialog("* 阿喔！偏離中心，Miss喵！<br>* 對手輕易避開了。喵喵喵喵。");
        setTimeout(resetToIdle, 1500);
    }

    // === 2. ACT / MERCY 系統 ===
    function openActMenu() {
        if(gameState !== battleState.IDLE) return;
        document.getElementById("btn-fight").classList.remove("active");
        gameState = battleState.MENU_ACTION;
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("act-menu-container").style.display = "flex";
        playSound(440, 50);
    }

    function executeAct(action) {
        playSound(600, 50);
        if (action === 'check') {
            updateCat("shock");
            showDialog("* 魔法野貓喵 - 攻擊 1 防禦 1喵。<br>* 貓貓最喜歡被稱讚。");
        } else if (action === 'praise') {
            updateCat("happy");
            showDialog("* 你稱讚了魔法貓咪的帽子很特別喵。<br>* 貓咪喵開心，發出了呼嚕嚕喵聲喵。");
        }
        setTimeout(resetToIdle, 3000);
    }

    function executeFlee() {
        if(gameState !== battleState.IDLE) return;
        document.getElementById("btn-fight").classList.remove("active");
        gameState = battleState.MENU_ACTION;
        playSound(800, 100);
        updateCat("bye");
        showDialog("* 你逃跑了喵...<br>* 脫離了戰鬥喵喵喵喵喵喵喵。");
        setTimeout(resetGame, 2000);
    }

    function resetToIdle() {
        gameState = battleState.IDLE;
        updateCat("normal");
        showDialog("* 戰鬥繼續喵喵喵喵喵喵喵... 在網頁點擊 FIGHT 後按 ESP32 攻擊。");
        document.getElementById("btn-fight").classList.add("active");
    }

    function resetGame() {
        enemyHp = enemyMaxHp;
        document.getElementById("enemy-hp-bar").style.width = "100%";
        resetToIdle();
        showDialog("* 一隻戴著魔法帽的野貓擋住了去路！<br>點擊 FIGHT 後按 ESP32 按鈕攻擊。喵。");
    }
</script>

</body>
</html>
