<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-bit 魔法貓大戰</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-size: 4px;
            --bg-color: #000;
            --text-color: #fff;
            --ui-color: #f1c40f;
            --hp-color: #2ecc71;
            --damage-color: #e74c3c;
        }

        body { font-family: 'VT323', monospace; background-color: #1a1a1a; color: var(--text-color); text-align: center; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .crt-effect { position: relative; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10; }

        .battle-arena { width: 640px; height: 480px; background-color: var(--bg-color); border: calc(var(--pixel-size) * 1.5) solid var(--text-color); box-sizing: border-box; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 20px; }

        /* === 敵方區域 === */
        .enemy-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 2rem; line-height: 1; margin-bottom: 20px; }
        .wizard-cat { white-space: pre; letter-spacing: -2px; color: #bdc3c7; transition: 0.3s; }
        
        /* 敵人血條動畫區 */
        .enemy-hp-container { display: flex; align-items: center; margin-top: 15px; gap: 15px; font-size: 1.5rem; }
        .enemy-hp-bar-outer { width: 150px; height: 15px; background-color: var(--damage-color); border: 2px solid #fff;}
        .enemy-hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); transition: width 0.4s ease-out; /* 扣血動畫 */ }

        /* === 戰鬥對話框 === */
        .battle-box { width: 100%; height: 150px; border: calc(var(--pixel-size)) solid var(--text-color); box-sizing: border-box; background-color: var(--bg-color); padding: 20px; font-size: 1.8rem; text-align: left; position: relative; display: flex; align-items: center; justify-content: center; }
        .box-text { width: 100%; }

        /* ACT 選單選項 */
        .act-menu-container { display: none; width: 100%; flex-wrap: wrap; justify-content: space-between; }
        .act-option { width: 45%; cursor: pointer; margin-bottom: 15px; transition: 0.1s; }
        .act-option:hover { color: var(--ui-color); }
        .act-option::before { content: "♥ "; color: var(--text-color); opacity: 0; transition: 0.1s; }
        .act-option:hover::before { opacity: 1; color: var(--damage-color); }

        /* 攻擊指針區 */
        #attack-bar-container { display: none; width: 80%; height: 60px; position: relative; }
        .attack-bar { width: 100%; height: 100%; background-color: var(--damage-color); border: calc(var(--pixel-size)) solid var(--text-color); box-sizing: border-box; position: relative; }
        .green-zone { width: 15%; height: 100%; background-color: var(--hp-color); position: absolute; left: 50%; transform: translateX(-50%); }
        .pointer { width: calc(var(--pixel-size) * 2); height: calc(100% + calc(var(--pixel-size) * 2)); background-color: var(--text-color); position: absolute; left: 0%; top: calc(var(--pixel-size) * -1); transition: left 0.1s linear; }
        .pointer.stopped { box-shadow: 0 0 calc(var(--pixel-size) * 3) var(--text-color); }

        /* === 玩家 UI 區域 === */
        .player-ui { height: 100px; margin-top: 20px; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-start; font-size: 1.5rem; }
        .player-info-row { display: flex; align-items: center; margin-bottom: 15px; width: 100%; gap: 20px;}
        .hp-bar-outer { width: 150px; height: 20px; background-color: var(--damage-color); border: 2px solid #fff;}
        .hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); }

        .action-buttons { display: flex; justify-content: space-between; width: 100%; margin-top: 10px; }
        .action-btn { background-color: var(--bg-color); color: var(--text-color); border: calc(var(--pixel-size)) solid var(--text-color); padding: 10px calc(var(--pixel-size) * 4); font-family: 'VT323', monospace; font-size: 2rem; cursor: pointer; position: relative; }
        .action-btn::before { content: "♥"; color: var(--damage-color); opacity: 0; position: absolute; left: calc(var(--pixel-size) * 2); transition: 0.1s; }
        .action-btn:hover, .action-btn.active { color: var(--ui-color); border-color: var(--ui-color); }
        .action-btn:hover::before, .action-btn.active::before { opacity: 1; }
        .action-btn:disabled { color: #555; border-color: #555; cursor: not-allowed; }

        .status-container { position: absolute; bottom: 10px; right: 10px; font-size: 1rem; color: #555;}
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; background-color: #e74c3c; }
        .online-dot.active { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
    </style>
</head>
<body>

<div class="crt-effect"></div>

<div class="container">
    <div class="battle-arena">
        
        <div class="enemy-area">
            <div id="msg" style="display: none; color: var(--text-color); font-size: 2rem;">注意 ESP32 指針！</div>
            <div id="cat-canvas" class="wizard-cat">
 /\_/\
( o.o ) <[Meeeowgic!]>
 > ^ <
            </div>
            <div class="enemy-hp-container">
                <span style="color:var(--hp-color);">HP</span>
                <div class="enemy-hp-bar-outer"><div id="enemy-hp-bar" class="enemy-hp-bar-inner"></div></div>
            </div>
        </div>

        <div class="battle-box">
            <div id="box-text-content" class="box-text">一隻戴著魔法帽的野貓擋住了去路！<br>在網頁點擊 FIGHT 後按 ESP32 攻擊。</div>
            
            <div id="act-menu-container" class="act-menu-container">
                <div class="act-option" onclick="executeAct('check')">* 檢查 (Check)</div>
                <div class="act-option" onclick="executeAct('praise')">* 讚賞 (Praise)</div>
            </div>

            <div id="attack-bar-container">
                <div class="attack-bar">
                    <div class="green-zone"></div>
                    <div id="attack-pointer" class="pointer"></div>
                </div>
            </div>
        </div>

        <div class="player-ui">
            <div class="player-info-row">
                <span>YOU [LV 1]</span>
                <div class="hp-bar-outer"><div class="hp-bar-inner"></div></div>
                <span>HP 20/20</span>
            </div>
        </div>

        <div class="action-buttons">
            <button id="btn-fight" class="action-btn active" onclick="startAttackSequence()">FIGHT</button>
            <button id="btn-act" class="action-btn" onclick="openActMenu()">ACT</button>
            <button id="btn-item" class="action-btn" disabled>ITEM</button>
            <button id="btn-mercy" class="action-btn" onclick="executeFlee()">MERCY</button>
        </div>

        <div class="status-container">
            <span id="online-dot" class="online-dot"></span> ESP32: <span id="status-text">離線</span>
        </div>

    </div>
</div>

<script>
    // === 設定與 MQTT ===
    const ROOM_ID = "UNDER_CAT_BATTLE_999"; 
    const topicBtn = `morsegame/${ROOM_ID}/button`;
    const topicStatus = `morsegame/${ROOM_ID}/status`;
    
    let client = new Paho.MQTT.Client("broker.emqx.io", 8084, "Web_" + Math.random().toString(16).substr(2,5));
    client.onMessageArrived = (m) => handleMqttMessage(m.destinationName, m.payloadString);
    client.connect({ useSSL: true, onSuccess: () => {
        client.subscribe(topicBtn); client.subscribe(topicStatus); setOffline();
    }});

    // === 遊戲變數 ===
    const battleState = { IDLE: 0, ATTACK_SWING: 1, MENU: 2 };
    let gameState = battleState.IDLE;
    let enemyMaxHp = 100;
    let enemyHp = 100;
    let lastPingTime = 0;

    // 貓咪表情包 ASCII
    const CAT_ART = {
        normal: " /\\_/\\\n( o.o ) <[Meeeowgic!]>\n > ^ < ",
        hurt:   " /\\_/\\\n( >.< ) <[Ouch!]>\n > - < ",
        happy:  " /\\_/\\\n( ^.^ ) <[Purrr~♥]>\n > w < ",
        shock:  " /\\_/\\\n( O_O ) <[...]>\n > - < ",
        bye:    " /\\_/\\\n( -.- ) <[Bye bye~]>\n > ~ < "
    };

    // 心跳監控
    setInterval(() => {
        if (Date.now() - lastPingTime > 5000 && lastPingTime !== 0) setOffline();
    }, 1000);

    function setOnline() { document.getElementById("online-dot").classList.add("active"); document.getElementById("status-text").innerText = "就緒"; }
    function setOffline() { document.getElementById("online-dot").classList.remove("active"); document.getElementById("status-text").innerText = "未連線"; lastPingTime = 0; }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, dur, type='square') {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime); o.start(); setTimeout(() => o.stop(), dur);
    }

    function handleMqttMessage(topic, payload) {
        if (topic === topicStatus) {
            if (payload === "ONLINE" || payload === "PING") { lastPingTime = Date.now(); setOnline(); }
            else if (payload === "OFFLINE") setOffline();
        } else if (topic === topicBtn && payload === "DOWN") {
            triggerPhysicalAttack();
        }
    }

    // === UI 切換輔助 ===
    function showDialog(text) {
        document.getElementById("box-text-content").style.display = "block";
        document.getElementById("act-menu-container").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("msg").style.display = "none";
        document.getElementById("box-text-content").innerHTML = text;
    }
    function updateCat(artType) { document.getElementById("cat-canvas").innerText = CAT_ART[artType]; }

    // === 1. FIGHT 系統 ===
    let attackPointerX = 0, attackPointerDir = 1, attackAnimationId = null;

    function startAttackSequence() {
        if(gameState !== battleState.IDLE) return;
        gameState = battleState.ATTACK_SWING;
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("act-menu-container").style.display = "none";
        document.getElementById("msg").style.display = "block";
        document.getElementById("attack-bar-container").style.display = "block";
        
        playSound(440, 100); setTimeout(()=>playSound(880, 100), 100);
        attackPointerX = 0; attackPointerDir = 1;
        document.getElementById("attack-pointer").style.left = "0%";
        document.getElementById("attack-pointer").classList.remove("stopped");
        startPointerAnimation();
    }

    function startPointerAnimation() {
        if(gameState !== battleState.ATTACK_SWING) return;
        attackPointerX += 4 * attackPointerDir; // 難度速度
        if (attackPointerX >= 100 || attackPointerX <= 0) attackPointerDir *= -1;
        document.getElementById("attack-pointer").style.left = attackPointerX + "%";
        attackAnimationId = requestAnimationFrame(startPointerAnimation);
    }

    function triggerPhysicalAttack() {
        if (gameState !== battleState.ATTACK_SWING) return;
        cancelAnimationFrame(attackAnimationId);
        document.getElementById("attack-pointer").classList.add("stopped");
        playSound(1200, 50);

        const greenMin = 42.5, greenMax = 57.5; // 50% 正中心，寬度 15%
        if (attackPointerX >= greenMin && attackPointerX <= greenMax) {
            let dmg = Math.round(40 - Math.abs(50 - attackPointerX));
            handleAttackHit(dmg);
        } else {
            handleAttackMiss();
        }
    }

    function handleAttackHit(dmg) {
        gameState = battleState.MENU;
        enemyHp -= dmg; if(enemyHp < 0) enemyHp = 0;
        
        // ★ 更新血條動畫 ★
        let hpPercent = (enemyHp / enemyMaxHp) * 100;
        document.getElementById("enemy-hp-bar").style.width = hpPercent + "%";
        
        updateCat("hurt");
        showDialog(`* 成功擊中！造成了 ${dmg} 點傷害。`);
        playSound(600, 100, 'sawtooth'); playSound(400, 200, 'sawtooth');

        setTimeout(() => {
            if (enemyHp === 0) {
                showDialog("* 魔法貓咪被擊敗了！獲得 0 EXP, 10 GOLD。");
                setTimeout(resetGame, 3000); // 3秒後重啟遊戲
            } else {
                resetToIdle();
            }
        }, 2000);
    }

    function handleAttackMiss() {
        gameState = battleState.MENU;
        showDialog("* 阿喔！沒按準，Miss！<br>* 貓咪嘲笑了你。");
        playSound(100, 300, 'sawtooth');
        setTimeout(resetToIdle, 1500);
    }

    // === 2. ACT 系統 ===
    function openActMenu() {
        if(gameState !== battleState.IDLE) return;
        gameState = battleState.MENU;
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("act-menu-container").style.display = "flex";
        playSound(440, 50);
    }

    function executeAct(action) {
        playSound(600, 50);
        if (action === 'check') {
            updateCat("shock");
            showDialog("* 魔法野貓 - 攻擊力 1 防禦力 1。<br>* 看起來很喜歡被稱讚。不會主動攻擊。");
        } else if (action === 'praise') {
            updateCat("happy");
            showDialog("* 你稱讚了魔法貓咪的帽子很好看。<br>* 貓咪大師很開心，發出了呼嚕嚕的聲音。");
        }
        setTimeout(resetToIdle, 3000);
    }

    // === 3. MERCY 系統 ===
    function executeFlee() {
        if(gameState !== battleState.IDLE) return;
        gameState = battleState.MENU;
        playSound(800, 100);
        updateCat("bye");
        showDialog("* 你選擇了逃跑...<br>* 順利脫離了戰鬥！");
        
        // 逃跑後 2 秒重置整個遊戲
        setTimeout(resetGame, 2000);
    }

    // === 狀態重置 ===
    function resetToIdle() {
        gameState = battleState.IDLE;
        updateCat("normal");
        showDialog("* 戰鬥繼續... 輪到你了。");
    }

    function resetGame() {
        enemyHp = enemyMaxHp;
        document.getElementById("enemy-hp-bar").style.width = "100%";
        resetToIdle();
        showDialog("* 一隻戴著魔法帽的野貓擋住了去路！<br>在網頁點擊 FIGHT 後按 ESP32 攻擊。");
    }

</script>

</body>
</html>
