<script>
    const ROOM_ID = "STU-s22115103";
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1490915002364985415/IIiu_o6Y5k7sfA5vs3FbsXxyTk1clSHrBpeNSVv2FcmhTXARqtsc3npq3PXpIRmVTz96";
    
    const topicLed = `morsegame/${ROOM_ID}/led`;
    const topicBtn = `morsegame/${ROOM_ID}/button`;
    const topicStatus = `morsegame/${ROOM_ID}/status`;
    
    let client, sequence = [], currentIndex = 0, level = 1;
    let gameState = "IDLE"; 
    
    // 心跳監控
    let lastPingTime = 0;
    setInterval(() => {
        // 如果超過 5 秒沒收到 ESP32 的訊號，強制轉為離線狀態
        if (Date.now() - lastPingTime > 5000 && lastPingTime !== 0) {
            setEspOffline();
        }
    }, 1000);

    // Web Audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = null;
    function playTone(dur) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = 600; o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); setTimeout(() => o.stop(), dur);
    }
    function toggleLiveTone(on) {
        if(on) {
            if(osc) return;
            osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.frequency.value = 600; osc.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start();
        } else { if(osc) { osc.stop(); osc = null; } }
    }

    // MQTT 連線
    client = new Paho.MQTT.Client("broker.emqx.io", 8084, "Web_" + Math.random().toString(16).substr(2,5));
    
    client.onMessageArrived = (m) => {
        let topic = m.destinationName;
        let payload = m.payloadString;

        if (topic === topicStatus) {
            if (payload === "ONLINE" || payload === "PING") {
                lastPingTime = Date.now();
                setEspOnline();
            } else if (payload === "OFFLINE") {
                setEspOffline();
            }
        } else if (topic === topicBtn) {
            handleInput(payload);
        }
    };

    client.connect({ useSSL: true, onSuccess: () => {
        client.subscribe(topicBtn);
        client.subscribe(topicStatus);
        setEspOffline(); // 初始設為離線，等待 ESP32 的 PING
    }});

    function setEspOnline() {
        document.getElementById("status-dot").className = "status-dot online";
        document.getElementById("status-text").innerText = "ESP32 已連線 (即時同步中)";
        if(document.getElementById("start-btn").innerText === "等待 ESP32") {
            document.getElementById("start-btn").disabled = false;
            document.getElementById("start-btn").innerText = "進入第一關";
        }
    }

    function setEspOffline() {
        document.getElementById("status-dot").className = "status-dot offline";
        document.getElementById("status-text").innerText = "ESP32 離線中 / 未插電";
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "等待 ESP32";
        lastPingTime = 0; // 重置計時
    }

    function sendLed(s) {
        let m = new Paho.MQTT.Message(s ? "1" : "0");
        m.destinationName = topicLed; client.send(m);
    }

    // === 遊戲邏輯 ===
    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        level = 1; showScreen("screen-game"); nextLevel();
    }

    async function nextLevel() {
        if(level > 5) return finishGame(true);
        document.getElementById("level-title").innerText = `第 ${level} / 5 關`;
        document.getElementById("msg").innerText = "注意看 LED 與聽聲音...";
        sequence = []; currentIndex = 0;
        let trackHtml = "";
        for(let i=0; i < level + 1; i++) { 
            let isLong = Math.random() > 0.5 ? 1 : 0;
            sequence.push(isLong);
            trackHtml += `<div class="node ${isLong?'long':'short'}" id="n-${i}"></div>`;
        }
        document.getElementById("track").innerHTML = trackHtml;
        gameState = "PLAYING";
        await new Promise(r => setTimeout(r, 1000));
        
        for(let i=0; i<sequence.length; i++) {
            let d = sequence[i] ? 600 : 200;
            sendLed(true); playTone(d);
            document.getElementById(`n-${i}`).classList.add("active-input");
            await new Promise(r => setTimeout(r, d));
            sendLed(false);
            document.getElementById(`n-${i}`).classList.remove("active-input");
            await new Promise(r => setTimeout(r, 300));
        }
        gameState = "WAITING"; document.getElementById("msg").innerText = "輪到你了！請按下按鈕";
    }

    function handleInput(payload) {
        if(gameState !== "WAITING") return;
        let node = document.getElementById(`n-${currentIndex}`);

        if(payload === "DOWN") {
            toggleLiveTone(true);
            node.classList.add("active-input");
        } else if (payload.startsWith("UP:")) {
            toggleLiveTone(false);
            node.classList.remove("active-input");
            
            // ★ 核心優化：直接讀取 ESP32 傳來的實體按壓時間 (毫秒)
            let hardwareDuration = parseInt(payload.split(":")[1]); 
            console.log("ESP32 判定按壓時間: " + hardwareDuration + " ms");
            
            let isLong = hardwareDuration > 400; // 超過 400ms 視為長按
            
            if(isLong === (sequence[currentIndex] === 1)) {
                node.classList.add("correct");
                currentIndex++;
                if(currentIndex === sequence.length) {
                    level++; setTimeout(nextLevel, 1000);
                }
            } else {
                node.classList.add("wrong");
                finishGame(false);
            }
        }
    }

    function finishGame(success) {
        gameState = "IDLE"; showScreen("screen-result");
        document.getElementById("result-title").innerText = success ? "🎉 挑戰成功！" : "❌ 挑戰失敗";
        document.getElementById("result-score").innerText = `最終進度：第 ${level > 5 ? 5 : level-1} / 5 關`;
        if(success) { sendLed(true); setTimeout(()=>sendLed(false), 1000); sendToDiscord(); }
    }

    function sendToDiscord() {
        if(!DISCORD_WEBHOOK.startsWith("http")) return;
        fetch(DISCORD_WEBHOOK, { method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({content: `🏆 **大師誕生！** 有人剛剛通過了摩斯記憶 **全部 5 個關卡**！`})
        });
    }

    function showScreen(id) {
        ["screen-start", "screen-game", "screen-result"].forEach(s => {
            document.getElementById(s).classList.toggle("hidden", s !== id);
        });
    }
    function resetToStart() { showScreen("screen-start"); }
</script>
