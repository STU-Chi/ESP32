<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貓咪大戰</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-size: 4px;
            --bg-color: #000;
            --text-color: #fff;
            --ui-color: #f1c40f;
            --hp-color: #2ecc71;
            --damage-color: #e74c3c;
        }

        body { 
            font-family: 'VT323', monospace; 
            background-color: #1a1a1a; 
            color: var(--text-color); 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        .crt-effect { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); 
            background-size: 100% 4px, 3px 100%; 
            pointer-events: none; z-index: 10; 
        }

        .battle-arena { 
            width: 100%; 
            max-width: 640px; 
            min-height: 80vh;
            background-color: var(--bg-color); 
            border: calc(var(--pixel-size) * 1.5) solid var(--text-color); 
            box-sizing: border-box; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 15px; 
            overflow: hidden;
        }

        /* === 斷線警告覆蓋層 === */
        .overlay-screen {
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); 
            z-index: 999; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        .enemy-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-size: 2rem; 
            line-height: 1.1; 
            min-height: 220px; 
            position: relative;
        }
        
        .enemy-visual-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 30px; 
        }

        .wizard-cat { 
            white-space: pre; 
            letter-spacing: -2px; 
            color: #bdc3c7; 
            transition: 0.1s; 
            position: relative;
            margin: 0 auto; 
            font-size: 2.2rem;
        }
        
        .cat-speech-bubble {
            position: absolute;
            top: 50px; 
            left: calc(100% + 20px);
            background-color: var(--bg-color);
            border: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            border-radius: calc(var(--pixel-size) * 2);
            padding: 10px 15px;
            font-size: 1.5rem;
            color: var(--text-color);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .cat-speech-bubble::after {
            content: "";
            position: absolute;
            left: calc(var(--pixel-size) * -2);
            top: calc(var(--pixel-size) * 2);
            width: calc(var(--pixel-size) * 3);
            height: calc(var(--pixel-size) * 3);
            background-color: var(--bg-color);
            border-left: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            border-bottom: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            transform: rotate(45deg);
        }

        .cat-speech-bubble.noconn-speech {
            top: -19px;
            left: calc(100% + 40px);
        }
        .cat-speech-bubble.noconn-speech::after {
            left: 30px; 
            top: 100%;  
            margin-top: calc(var(--pixel-size) * -1); 
            border-left: none; 
            border-top: none;  
            border-right: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            border-bottom: calc(var(--pixel-size) * 0.8) solid var(--text-color);
            transform: rotate(45deg); 
        }

        @keyframes damageShake {
            0%, 100% { transform: translateX(0px); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(15px); }
            20%, 40%, 60%, 80% { transform: translateX(-15px); }
        }
        .wizard-cat.shake { animation: damageShake 0.6s linear; animation-iteration-count: 1; }

        .particle { position: absolute; background-color: var(--text-color); width: 4px; height: 4px; pointer-events: none; z-index: 100; }
        .pixel-fade { transition: opacity 0.5s ease-out; opacity: 0 !important; }

        .enemy-hp-container { display: flex; align-items: center; margin-top: 15px; gap: 15px; font-size: 1.5rem; }
        .enemy-hp-bar-outer { width: 150px; height: 15px; background-color: var(--damage-color); border: 2px solid #fff;}
        .enemy-hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); transition: width 0.4s ease-out; }

        .battle-box { 
            width: 100%; min-height: 150px; border: calc(var(--pixel-size)) solid var(--text-color); 
            box-sizing: border-box; background-color: var(--bg-color); padding: 20px; 
            font-size: 1.8rem; text-align: left; display: flex; align-items: center; justify-content: center; 
        }
        .box-text { width: 100%; line-height: 1.4; }

        .act-menu-container { display: none; width: 100%; flex-wrap: wrap; justify-content: space-between; gap: 10px;}
        .act-option { width: 45%; cursor: pointer; transition: 0.1s; }
        .act-option:hover { color: var(--ui-color); }
        .act-option::before { content: "♥ "; color: var(--text-color); opacity: 0; transition: 0.1s; }
        .act-option:hover::before { opacity: 1; color: var(--damage-color); }

        #attack-bar-container { display: none; width: 90%; height: 40px; position: relative; margin: 20px 0; }
        .attack-bar { width: 100%; height: 100%; background-color: var(--damage-color); border: calc(var(--pixel-size)) solid var(--text-color); box-sizing: border-box; position: relative; }
        .green-zone { width: 30%; height: 100%; background-color: var(--hp-color); position: absolute; left: 50%; transform: translateX(-50%); }
        .pointer { width: calc(var(--pixel-size) * 1.5); height: calc(100% + calc(var(--pixel-size) * 2)); background-color: var(--text-color); position: absolute; left: 0%; top: calc(var(--pixel-size) * -1); transition: left 0.1s linear; }
        .pointer.stopped { box-shadow: 0 0 calc(var(--pixel-size) * 2) var(--text-color); background-color: var(--text-color); }

        .player-ui { margin-top: 10px; display: flex; flex-direction: column; align-items: flex-start; font-size: 1.5rem; }
        .player-info-row { display: flex; align-items: center; width: 100%; gap: 15px; flex-wrap: wrap; }
        .hp-bar-outer { width: 120px; height: 20px; background-color: var(--damage-color); border: 2px solid #fff;}
        .hp-bar-inner { width: 100%; height: 100%; background-color: var(--hp-color); }

        .action-buttons { display: flex; justify-content: space-between; width: 100%; gap: 10px; flex-wrap: wrap; }
        .action-btn { 
            flex: 1 1 25%; background-color: var(--bg-color); color: var(--text-color); 
            border: calc(var(--pixel-size)) solid var(--text-color); padding: 12px 5px; 
            font-family: 'VT323', monospace; font-size: 1.8rem; cursor: pointer; 
            position: relative; text-align: center; transition: color 0.1s, border-color 0.1s;
        }
        .action-btn::before { content: "♥"; color: var(--damage-color); opacity: 0; position: absolute; left: 5px; transition: opacity 0.1s; }
        .action-btn:hover { color: var(--ui-color); border-color: var(--ui-color); }
        .action-btn:hover::before { opacity: 1 !important; } 
        .action-btn.active::before { opacity: 1; }
        .action-buttons:hover .action-btn.active::before { opacity: 0; }

        .status-container { position: absolute; top: -25px; right: 0px; font-size: 1rem; color: #888; white-space: nowrap;}
        .status-container span { transition: color 0.3s; }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; background-color: #e74c3c; }
        .online-dot.active { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        
        #queue-status { color: #f1c40f; margin-left: 10px; font-weight: bold; }

        @media (max-width: 600px) {
            .battle-arena { padding: 15px; border-width: 2px; }
            .enemy-area { font-size: 1.5rem; min-height: 180px; }
            .enemy-visual-container { flex-direction: column-reverse; padding-top: 0; }
            .wizard-cat { font-size: 1.5rem; letter-spacing: -1px; margin-top: 10px;}
            
            .cat-speech-bubble, .cat-speech-bubble.noconn-speech {
                position: static !important; transform: none; right: auto !important; top: auto !important; 
                left: auto !important; /* 新增這一項 */
                margin-bottom: 15px; font-size: 1.2rem; padding: 8px 12px;
            }
            .cat-speech-bubble::after, .cat-speech-bubble.noconn-speech::after { display: none !important; }
            
            .battle-box { font-size: 1.4rem; min-height: 120px; padding: 15px; }
            .player-ui { font-size: 1.2rem; }
            .action-btn { flex: 1 1 100%; font-size: 1.5rem; padding: 12px 0; margin-bottom: 5px; }
            .action-btn::before { display: none !important; }
            .action-btn.active { color: var(--ui-color); border-color: var(--ui-color); }
            .status-container { font-size: 0.8rem; top: -20px; }
        }
    </style>
</head>
<body>

<div class="crt-effect"></div>

<div class="container" style="width: 100%; max-width: 640px; position: relative;">
    <div class="status-container">
        <span id="online-dot" class="online-dot"></span> ESP32: <span id="status-text">離線</span>
        <span id="queue-status"></span>
    </div>

    <div class="battle-arena">
        
        <div id="disconnect-overlay" class="overlay-screen">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 30px;">
                <div class="wizard-cat" style="font-size: 3rem;">
 /\_/\ 
( O_O )
 > - < 
                </div>
                <div style="background-color: var(--bg-color); border: calc(var(--pixel-size) * 0.8) solid var(--text-color); border-radius: calc(var(--pixel-size) * 2); padding: 20px 30px; font-size: 2rem; color: var(--text-color); position: relative;">
                    武器在別人手上喵，請稍待片刻...
                    <div style="position: absolute; left: 50%; top: calc(var(--pixel-size) * -2); width: calc(var(--pixel-size) * 3); height: calc(var(--pixel-size) * 3); background: var(--bg-color); border-left: calc(var(--pixel-size) * 0.8) solid var(--text-color); border-top: calc(var(--pixel-size) * 0.8) solid var(--text-color); transform: translateX(-50%) rotate(45deg);"></div>
                </div>
            </div>
        </div>

        <div id="queue-overlay" class="overlay-screen">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 30px;">
                <div class="wizard-cat" style="font-size: 3rem; color:#f1c40f;"> 
 /\_/\ 
( -.- )
 > ~ < 
                </div>
                <div style="background-color: var(--bg-color); border: calc(var(--pixel-size) * 0.8) solid #f1c40f; border-radius: calc(var(--pixel-size) * 2); padding: 20px 30px; font-size: 2rem; color: #f1c40f; position: relative;">
                    有人正在和貓咪戰鬥中喵！<br>請等待對方關閉網頁或離開...
                </div>
            </div>
        </div>

        <div class="enemy-area">
            <div id="msg" style="display: none; color: var(--damage-color); font-size: 1.5rem; margin-bottom: -24px;">注意指針！按下攻擊</div>
            
            <div class="enemy-visual-container">
                <div id="cat-canvas" class="wizard-cat">  /\_/\ 
( o.o )
 > ^ < 
                </div>
                <div id="cat-speech-text" class="cat-speech-bubble">Meeeowgic!</div>
            </div>

            <div class="enemy-hp-container">
                <span style="color:var(--hp-color);">HP</span>
                <div class="enemy-hp-bar-outer"><div id="enemy-hp-bar" class="enemy-hp-bar-inner"></div></div>
            </div>
        </div>

        <div class="battle-box">
            <div id="box-text-content" class="box-text">一隻野貓擋住了去路喵！<br>在網頁點擊 FIGHT 後點擊按鈕攻擊。</div>
            
            <div id="act-menu-container" class="act-menu-container">
                <div class="act-option" onclick="executeAct('check')">* 檢查 (Check)</div>
                <div class="act-option" onclick="executeAct('praise')">* 讚賞 (Praise)</div>
            </div>

            <div id="attack-bar-container">
                <div class="attack-bar">
                    <div class="green-zone"></div>
                    <div id="attack-pointer" class="pointer"></div>
                </div>
            </div>
        </div>

        <div class="player-ui">
            <div class="player-info-row">
                <span>YOU [LV 1]</span>
                <div class="hp-bar-outer"><div class="hp-bar-inner"></div></div>
                <span>HP 20/20</span>
            </div>
        </div>

        <div class="action-buttons">
            <button id="btn-fight" class="action-btn active" onclick="startAttackSequence()">FIGHT</button>
            <button id="btn-act" class="action-btn" onclick="openActMenu()">ACT</button>
            <button id="btn-mercy" class="action-btn" onclick="executeFlee()">MERCY</button>
        </div>

    </div>
</div>

<script>
    const ROOM_ID = "UNDER_CAT_BATTLE_999"; 
    // 生成隨機 ID，避免網頁多開時互相踢下線
    const myPlayerId = Math.random().toString(36).substring(2, 10);
    const CLIENT_ID = "WebPlayer_" + myPlayerId; 

    // MQTT Topics
    const topicBtn = `morsegame/${ROOM_ID}/button`;
    const topicStatus = `morsegame/${ROOM_ID}/status`;
    const topicHostHeartbeat = `morsegame/${ROOM_ID}/host_heartbeat`; // 網頁互搶房主專用

    let client = new Paho.MQTT.Client("broker.emqx.io", 8084, CLIENT_ID);

    // 遊戲與連線狀態
    let isHost = false; 
    let lastHostHeartbeat = 0;
    const battleState = { IDLE: 0, ATTACK_SWING: 1, MENU_ACTION: 2, ENEMY_DAMAGE_ANIM: 3 };
    let gameState = battleState.IDLE;
    let enemyMaxHp = 100, enemyHp = 100, lastPingTime = 0;

    const CAT_ART = { normal: " /\\_/\\ \n( o.o )\n > ^ < ", hurt:   " /\\_/\\ \n( >.< )\n > - < ", happy:  " /\\_/\\ \n( ^.^ )\n > w < ", shock:  " /\\_/\\ \n( O_O )\n > - < ", bye:  " /\\_/\\ \n( -v- )\n > ~ < " };
    const CAT_SPEECH = { normal: "Meeeowgic!", hurt: "Ouch!", happy: "Purrr~♥", shock: "  ...  ", bye: "Bye bye~" };

    client.onConnectionLost = function (responseObject) {
        if (responseObject.errorCode !== 0) {
            console.warn("斷線原因: " + responseObject.errorMessage);
            setOffline();
            // 如果自己是房主，斷線就放棄身分
            if(isHost) becomeSpectator();
        }
    };

    client.onMessageArrived = (m) => handleMqttMessage(m.destinationName, m.payloadString);
    
    client.connect({ 
        useSSL: true, 
        onSuccess: () => {
            client.subscribe(topicBtn); 
            client.subscribe(topicStatus); 
            client.subscribe(topicHostHeartbeat); // 訂閱房主心跳
            setOffline();
            
            // 剛連線時，給 2 秒鐘聽看看有沒有別人在玩
            setTimeout(() => {
                if (!isHost && lastHostHeartbeat === 0) {
                    becomeHost();
                }
            }, 2000);
        }
    });

    // 處理 MQTT 訊息
    function handleMqttMessage(topic, payload) {
        // 1. 處理網頁互斥 (排隊機制)
        if (topic === topicHostHeartbeat) {
            if (payload === "RELEASE") {
                // 原房主離開了，立刻清空心跳時間，觸發接管
                lastHostHeartbeat = 0; 
                return;
            }
            if (payload !== myPlayerId) {
                lastHostHeartbeat = Date.now();
                if (isHost) {
                    // 如果同時兩個人宣稱自己是房主，比 ID 大小決定誰讓位
                    if (myPlayerId > payload) becomeSpectator();
                } else {
                    becomeSpectator();
                }
            }
        }
        
        // 2. 處理 ESP32 狀態
        else if (topic === topicStatus) {
            if (payload === "ONLINE" || payload === "PING") { 
                lastPingTime = Date.now(); 
                setOnline(); 
            } else if (payload === "OFFLINE") {
                setOffline();
            }
        } 
        
        // 3. 處理按鈕攻擊 (只有當自己是房主時才接受硬體訊號)
        else if (topic === topicBtn && payload === "DOWN") {
            if (!isHost) return; // 觀戰者無視按鈕

            if (gameState === battleState.IDLE) {
                startAttackSequence();
            } else if (gameState === battleState.ATTACK_SWING) {
                triggerPhysicalAttack();
            }
        }
    }

    // === 核心：房主輪替輪詢 ===
    setInterval(() => {
        if (isHost) {
            // 如果我是房主，持續廣播「我還在玩」
            if(client.isConnected()) {
                let message = new Paho.MQTT.Message(myPlayerId);
                message.destinationName = topicHostHeartbeat;
                client.send(message);
            }
        } else {
            // 如果我不是房主，檢查前一個房主是不是超過 4 秒沒發心跳
            if (Date.now() - lastHostHeartbeat > 4000 && lastHostHeartbeat !== 0) {
                becomeHost(); // 對方斷線或關網頁了，換我接手！
            }
        }

        // ESP32 即時動態偵測 (縮短為 3 秒即視為斷線，反應更敏銳)
        if (Date.now() - lastPingTime > 3000 && lastPingTime !== 0) setOffline();
    }, 1500);

    // === 當玩家主動關閉網頁時，立刻釋放控制權 ===
    window.addEventListener('beforeunload', () => {
        if (isHost && client.isConnected()) {
            let message = new Paho.MQTT.Message("RELEASE");
            message.destinationName = topicHostHeartbeat;
            client.send(message);
        }
    });

    // 成為房主
    function becomeHost() {
        isHost = true;
        document.getElementById("queue-overlay").style.display = "none";
        document.getElementById("queue-status").innerText = "";
        document.getElementById("queue-status").style.color = "#2ecc71";
    }

    // 成為觀戰排隊者
    function becomeSpectator() {
        if (isHost) resetToIdle(); // 若原本在玩被擠掉，重置狀態
        isHost = false;
        document.getElementById("queue-overlay").style.display = "flex";
        document.getElementById("queue-status").innerText = "[排隊等待中]";
        document.getElementById("queue-status").style.color = "#f1c40f";
    }

    // 狀態文字更新
    function setOnline() { 
        document.getElementById("online-dot").classList.add("active"); 
        document.getElementById("status-text").innerText = "就緒"; 
        document.getElementById("disconnect-overlay").style.display = "none"; // 隱藏斷線遮罩
    }
    function setOffline() { 
        document.getElementById("online-dot").classList.remove("active"); 
        document.getElementById("status-text").innerText = "離線尋找中..."; 
        lastPingTime = 0; 
        if (isHost) document.getElementById("disconnect-overlay").style.display = "flex"; // 只有房主顯示斷線遮罩
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, dur, type='square', volume=0.05) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(volume, audioCtx.currentTime); o.start(); setTimeout(() => o.stop(), dur);
    }

    function showDialog(text) {
        document.getElementById("box-text-content").style.display = "block";
        document.getElementById("act-menu-container").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("msg").style.display = "none";
        document.getElementById("box-text-content").innerHTML = text;
    }
    
    function updateCat(artType) { 
        document.getElementById("cat-canvas").innerText = CAT_ART[artType];
        document.getElementById("cat-speech-text").innerText = CAT_SPEECH[artType];
    }

    // === 戰鬥系統 ===
    let attackPointerX = 0, attackPointerDir = 1, attackAnimationId = null;

    function startAttackSequence() {
        if(!isHost || gameState !== battleState.IDLE) return; // 鎖定：非房主無法點擊

        const isOnline = document.getElementById("online-dot").classList.contains("active");

        if (!isOnline) {
            gameState = battleState.MENU_ACTION;
            updateCat("happy"); 
            
            const speechBubble = document.getElementById("cat-speech-text");
            speechBubble.classList.add("noconn-speech");
            speechBubble.innerText = "嘿嘿，沒連上 ESP32 攻擊不到我喵！";
            
            showDialog("* 你揮動了武器，但因為 ESP32 沒連線，攻擊完全無效！<br>* 野貓露出了得意的笑容。喵。");

            setTimeout(() => {
                updateCat("normal");
                speechBubble.classList.remove("noconn-speech");
                resetToIdle();
            }, 2500);
            return;
        }

        gameState = battleState.ATTACK_SWING;
        document.getElementById("btn-fight").classList.remove("active");
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("msg").style.display = "block";
        document.getElementById("attack-bar-container").style.display = "block";
        
        playSound(440, 100, 'square'); setTimeout(()=>playSound(880, 100, 'square'), 100);
        attackPointerX = 0; attackPointerDir = 1;
        document.getElementById("attack-pointer").style.left = "0%";
        document.getElementById("attack-pointer").classList.remove("stopped");
        startPointerAnimation();
    }

    function startPointerAnimation() {
        if(gameState !== battleState.ATTACK_SWING) return;
        attackPointerX += 1.5 * attackPointerDir; 
        if (attackPointerX >= 100 || attackPointerX <= 0) attackPointerDir *= -1;
        document.getElementById("attack-pointer").style.left = attackPointerX + "%";
        attackAnimationId = requestAnimationFrame(startPointerAnimation);
    }

    function triggerPhysicalAttack() {
        if (gameState !== battleState.ATTACK_SWING) return;
        cancelAnimationFrame(attackAnimationId);

        const lagOffset = 4; 
        attackPointerX -= lagOffset * attackPointerDir;

        if (attackPointerX < 0) attackPointerX = 0;
        if (attackPointerX > 100) attackPointerX = 100;

        document.getElementById("attack-pointer").style.left = attackPointerX + "%";
        document.getElementById("attack-pointer").classList.add("stopped");
        playSound(1200, 50, 'square', 0.1);

        const greenMin = 42.5, greenMax = 66.5; 
        const isHit = attackPointerX >= greenMin && attackPointerX <= greenMax;
        const dmg = isHit ? Math.round(40 - Math.abs(50 - attackPointerX)) : 0;
        const accuracy = Math.round(attackPointerX);

        gameState = battleState.ENEMY_DAMAGE_ANIM;
        document.getElementById("cat-canvas").classList.add("shake");
        if(isHit) playSound(150, 600, 'sawtooth', 0.1);

        setTimeout(() => {
            document.getElementById("cat-canvas").classList.remove("shake");
            document.getElementById("attack-bar-container").style.display = "none";
            document.getElementById("box-text-content").style.display = "block";
            document.getElementById("msg").style.display = "none";
            if (isHit) {
                handleAttackResolutionHit(dmg, accuracy);
            } else {
                handleAttackResolutionMiss();
            }
        }, 600); 
    }
    
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1490915002364985415/IIiu_o6Y5k7sfA5vs3FbsXxyTk1clSHrBpeNSVv2FcmhTXARqtsc3npq3PXpIRmVTz96";

    function sendDiscordMessage(msg) {
        if (!DISCORD_WEBHOOK_URL || DISCORD_WEBHOOK_URL.includes("你的_")) return;
        const payload = { content: "【戰鬥結束】", embeds: [{ title: "野貓的話", description: msg, color: 15158332 }] };
        fetch(DISCORD_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }).catch(err => console.error("Discord 發送失敗:", err));
    }

    function createParticles(element) {
        const rect = element.getBoundingClientRect();
        const count = 30; 
        for (let i = 0; i < count; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            document.body.appendChild(particle);

            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;
            const destinationX = (Math.random() - 0.5) * 200;
            const destinationY = (Math.random() - 0.5) * 200;

            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;

            const animation = particle.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px)`, opacity: 0 }
            ], { duration: 800 + Math.random() * 400, easing: 'cubic-bezier(0, .9, .57, 1)', fill: 'forwards' });

            animation.onfinish = () => particle.remove();
        }
    }

    function handleAttackResolutionHit(dmg, accuracy) {
        gameState = battleState.MENU_ACTION;
        enemyHp -= dmg; if(enemyHp < 0) enemyHp = 0;
        let hpPercent = (enemyHp / enemyMaxHp) * 100;
        document.getElementById("enemy-hp-bar").style.width = hpPercent + "%";
        
        updateCat("hurt"); 
        showDialog(`* 成功扣除 ${dmg} 傷害。<br>* 對野貓造成了有效打擊。`);
        
        setTimeout(() => {
            if (enemyHp === 0) {
                const catCanvas = document.getElementById("cat-canvas");
                const speechBubble = document.getElementById("cat-speech-text");
                
                updateCat("shock");
                createParticles(catCanvas);
                catCanvas.classList.add("pixel-fade");
                speechBubble.classList.add("pixel-fade");

                showDialog("* 野貓被擊敗了喵！喵嗚嗚嗚。");
                sendDiscordMessage("喵嗚... 你真的下手了喵... 我會回來的喵...");

                setTimeout(() => {
                    catCanvas.classList.remove("pixel-fade");
                    speechBubble.classList.remove("pixel-fade");
                    resetGame();
                }, 4000); 
            } else {
                resetToIdle();
            }
        }, 2000);
    }

    function handleAttackResolutionMiss() {
        gameState = battleState.MENU_ACTION;
        playSound(100, 300, 'sawtooth', 0.1);
        updateCat("normal");
        showDialog("* 阿喔！偏離中心，Miss喵！<br>* 對手輕易避開了。喵喵喵喵。");
        setTimeout(resetToIdle, 1500);
    }

    function openActMenu() {
        if(!isHost || gameState !== battleState.IDLE) return;
        document.getElementById("btn-fight").classList.remove("active");
        gameState = battleState.MENU_ACTION;
        document.getElementById("box-text-content").style.display = "none";
        document.getElementById("attack-bar-container").style.display = "none";
        document.getElementById("act-menu-container").style.display = "flex";
        playSound(440, 50);
    }

    function executeAct(action) {
        playSound(600, 50);
        if (action === 'check') {
            updateCat("shock");
            showDialog("* 神奇的野貓 - 攻擊 1 防禦 1喵。<br>* 貓貓最喜歡被稱讚。");
        } else if (action === 'praise') {
            updateCat("happy");
            showDialog("* 你稱讚了貓咪特別喵。<br>* 貓咪喵開心，發出了呼嚕嚕喵聲喵。");
        }
        setTimeout(resetToIdle, 3000);
    }

    function executeFlee() {
        if(!isHost || gameState !== battleState.IDLE) return;
        document.getElementById("btn-fight").classList.remove("active");
        gameState = battleState.MENU_ACTION;
        playSound(800, 100);
        updateCat("bye");
        showDialog("* 你逃跑了喵...<br>* 脫離了戰鬥喵喵喵喵喵喵喵。");
        setTimeout(resetGame, 2000);
    }

    function resetToIdle() {
        gameState = battleState.IDLE;
        updateCat("normal");
        showDialog("* 戰鬥繼續喵喵喵喵喵喵喵... 在網頁點擊 FIGHT 後按 ESP32上的按鈕攻擊。");
        document.getElementById("btn-fight").classList.add("active");
    }

    function resetGame() {
        enemyHp = enemyMaxHp;
        document.getElementById("enemy-hp-bar").style.width = "100%";
        resetToIdle();
        showDialog("* 一隻野貓擋住了去路！<br>點擊 FIGHT 後按 ESP32上的按鈕攻擊。喵。");
    }
</script>
